<!doctype html>
<html class="webext-base-css-modal" lang="en">
	<meta charset="UTF-8" />
	<base target="_blank" />
	<title>One Click Extension Manager options</title>
	<style>
		@import './webext-base.css';
		body {
			padding: 20px !important;
		}
		hr {
			--body-margin-h: 20px;
		}
		h1 {
			font-weight: 100;
			line-height: 1;
		}
		label {
			display: block;
		}
		select {
			line-height: 2;
			height: 2.4em; /* Match the height of the input */
		}
		ul {
			padding-left: 1em;
		}
		p:has([value='tab']:checked, [value='sidebar']:checked)
			~ p:has(label[for='width']) {
			display: none;
		}
		fieldset {
			border: none;
			padding: 0;
			margin-block: 1em;
		}
		legend {
			margin: 0;
		}

		/* TODO: Extract https://github.com/fregante/webext-base-css/issues/22 */
		:root.webext-base-css-modal hr {
			margin-inline: calc(-1 * var(--body-margin-h));
			border: none;
			border-bottom: 1px solid #aaa4;
		}
	</style>
	<script type="module" defer src="options.js"></script>
	<h1>One-Click Extensions Manager</h1>
	<form id="options-form" method="get">
		<fieldset>
			<legend>Location</legend>
			<label>
				<input type="radio" checked name="position" value="popup" />
				Menu (default)
			</label>
			<label>
				<input type="radio" name="position" value="window" />
				Popup window
			</label>
			<label>
				<input type="radio" name="position" value="tab" />
				Tab
			</label>
			<label>
				<input type="radio" name="position" value="sidebar" />
				Sidebar
			</label>
		</fieldset>

		<fieldset>
			<legend>Show buttons</legend>
			<label>
				<input type="radio" checked name="showButtons" value="on-demand" />
				On right click (default)
			</label>
			<label>
				<input type="radio" name="showButtons" value="always" />
				Always
			</label>
		</fieldset>

		<fieldset>
			<legend>Display</legend>
			<label>
				<input type="radio" checked name="name" value="short" />
				Short name (default)
			</label>
			<label>
				<input type="radio" name="name" value="full" />
				Full name
			</label>
		</fieldset>

		<p>
			<label for="width">Width <small>(in pixels)</small> </label>
			<input id="width" type="text" name="width" placeholder="400" size="5" />
		</p>
	</form>
	<hr />
	<p>
		If you find this useful, consider supporting its development by donating or
		leaving a review.
	</p>
	<ul>
		<li>
			<a
				href="https://chrome.google.com/webstore/detail/one-click-extensions-mana/pbgjpgbpljobkekbhnnmlikbbfhbhmem/reviews"
			>
				Reviews
			</a>
		</li>
		<li><a href="https://github.com/sponsors/fregante">Donations</a></li>
		<li>
			<a href="https://github.com/hankxdev/one-click-extensions-manager">
				Open source on GitHub
			</a>
		</li>
	</ul>
	<p>
		Made by <a href="https://fregante.com">fregante</a> 🇮🇹 and
		<a href="https://momane.com/">Hank Yang</a> 🇨🇳
	</p>
</html>
